<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deepika Collections</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #fff5f7;
}

header {
    background: #b30059;
    color: white;
    padding: 15px;
    text-align: center;
}

nav {
    display: flex;
    justify-content: center;
    background: #ff3385;
    padding: 10px;
}

nav a {
    color: white;
    text-decoration: none;
    margin: 0 20px;
    font-weight: bold;
}

nav a:hover {
    text-decoration: underline;
}

.hero {
    text-align: center;
    padding: 60px;
    background: linear-gradient(to right, #ff80bf, #ff4da6);
    color: white;
}

.products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    padding: 40px;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0px 3px 10px rgba(0,0,0,0.2);
    text-align: center;
}

.card img {
    width: 100%;
    border-radius: 10px;
}

.card h3 {
    color: #b30059;
}

button {
    background: #ff3385;
    color: white;
    border: none;
    padding: 10px 15px;
    cursor: pointer;
    border-radius: 5px;
}

button:hover {
    background: #cc0066;
}

footer {
    text-align: center;
    background: #b30059;
    color: white;
    padding: 15px;
}
</style>
</head>

<body>

<header>
    <h1>Deepika Collection</h1>
    <p>Elegance in Every Thread</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Collections</a>
    <a href="#">Offers</a>
    <a href="#">Contact</a>
</nav>

<section class="hero">
    <h2>Welcome to Deepika Collections</h2>
    <p>Discover Beautiful Traditional Pattu & Designer Sarees</p>
    <button>Shop Now</button>
</section>

<section class="products">

    <div class="card">
        <img src="https://via.placeholder.com/250x300" alt="Saree">
        <h3>Pattu Silk Saree</h3>
        <p>₹3,999</p>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/250x300" alt="Saree">
        <h3>Designer Saree</h3>
        <p>₹2,000</p>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/250x300" alt="Saree">
        <h3>Cotton Saree</h3>
        <p>₹1,299</p>
        <button>Add to Cart</button>
    </div>

</section>

<footer>
    <p>© 2026 Deepika Sarees | All Rights Reserved</p>
</footer>

</body>
</html>
